{% extends 'base.html' %}
    {% block heading %}
    Filter Incidents
    {% endblock %}

    {% block content %}
    <form action='/filter' method='GET'>
        <label for='vulnerability'>Vulnerabilty:</label>
        <select id='vul_id' name='vul_id'>
            <option selected>Select</option>
            <option value=''>Any</option>
            <option value=1>Broken access control</option>
            <option value=2>Security Misconfiguration</option>
            <option value=3>Software Supply Chain Failures</option>
        </select>
        <br><br>

        <label for='Year'>Minimum Year:</label>
        <input type='number' id='year' name='year' min='2017' max='2024' value="2017">
        <br><br>

        <label for='limit'>No. of results:</label>
        <input type='number' id='limit' name='limit' min='1' max='20' value="8">
        <br><br>

        <input type='submit' value='Filter Incidents'>
        <br><br>
    </form>

    <a href="/" class="btn btn-success">Return Home</a>
    {% endblock %}
