{% extends 'base.html' %}

<!-- update the heading to be the vulnerability name that was clicked on from index.html -->

{% block heading %}
{{ vulnerability }}
<p hidden>
    {{vul_id}}
</p>
{% endblock %}

{% block content %}
<!-- Use a for loop to display the incidents that match the vulnerability. -->

<div class="row">
    {% for v in vul_list %}
    <div class="col-12 col-md-12 mb-3">
        <div class="card p-3">
            <h5>{{ v.inc_name }} Incident</h5>
            <p>{{ v.inc_year }}</p>
            <p><a href="{{ v.inc_url }}" target="_blank" rel="noopener noreferrer">{{ v.inc_url }}</a></p> <!-- Clickable link here!-->
        </div>
    </div>
    {% endfor %}
<a href="/add-incident/{{vul_id}}" class="btn btn-success">Add Incident</a>
</div>
<br><br/>
<a href="/" class="btn btn-success">Return Home</a>
{% endblock %}
