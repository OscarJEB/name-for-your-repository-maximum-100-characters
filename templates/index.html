{% extends 'base.html' %}

{% block content %}
<a href="/search" class="btn btn-primary btn-lg">Filter Incidents</a>

<div class="row">
    {% for v in vulnerabilities %}
    <div class="col-12 col-md-12 mb-3">
        <div class="card p-3">
            <h5>Rank: {{ v.owasp_rank }}</h5>
            <p>{{ v.vul_name }}</p>
            <a href="/incidents/{{ v.id }}" class="btn btn-primary">View</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
